{% extends "base.html" %}
{% block content %}

<div class="container mt-5" style="font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div style="width: 100%; max-width: 550px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); overflow: hidden;">
        
        <div style="background: #1a202c; color: white; padding: 25px; text-align: center;">
            <h3 style="margin: 0; font-weight: 600;">Update Student Profile</h3>
            <p style="color: #a0aec0; margin: 5px 0 0 0; font-size: 0.9rem;">Modify the student registry properties safely.</p>
        </div>

        <div style="padding: 30px;">
            
            <form action="{{ url_for('edit_student', id=student[0] if student is sequence else student.id) }}" method="POST">
                
                <div style="background: #ebf8ff; color: #2b6cb0; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.85rem; border-left: 4px solid #3182ce;">
                    <i class="fas fa-info-circle me-1"></i> 
                    Register Number & Identity keys cannot be mutated here.
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; color: #4a5568; font-weight: 600; font-size: 0.9rem;">Student Full Name</label>
                    <input type="text" name="name" value="{{ student[1] if student is sequence else student.name }}" required autocomplete="off"
                           style="width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; background: #f7fafc; outline: none; color: #2d3748;">
                </div>

                <div style="margin-bottom: 25px;">
                    <label style="display: block; margin-bottom: 8px; color: #4a5568; font-weight: 600; font-size: 0.9rem;">Institutional Email Field</label>
                    <input type="email" name="email" value="{{ student[5] if student is sequence else student.email }}" required
                           style="width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; background: #f7fafc; outline: none; color: #2d3748;">
                </div>

                <div style="display: flex; gap: 12px; align-items: center;">
                    <button type="submit" style="flex: 1; background: #3182ce; color: white; padding: 12px; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s;">
                        <i class="fas fa-save me-1"></i> Save Changes
                    </button>
                    
                    <a href="{{ url_for('students') }}" style="flex: 1; text-align: center; background: #e2e8f0; color: #4a5568; padding: 12px; border-radius: 6px; text-decoration: none; font-size: 0.95rem; font-weight: 600; box-sizing: border-box; transition: background 0.2s;">
                        Cancel
                    </a>
                </div>

            </form>

        </div>
    </div>
</div>

{% endblock %}
