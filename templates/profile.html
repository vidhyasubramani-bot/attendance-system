{% extends "base.html" %}
{% block content %}
<div style="display: flex; min-height: 100vh;">
    <div style="width: 260px; background-color: #1a202c; color: white; padding-top: 30px;">
        <h3 style="text-align: center; margin-bottom: 30px;">Smart Attendance</h3>
        <p style="padding: 10px 25px; margin: 0;"><a href="{{ url_for('dashboard') }}" style="color: #cbd5e1; text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to Dashboard</a></p>
    </div>
    
    <div style="flex: 1; padding: 40px; background-color: #f7fafc;">
        <h2 style="color: #2d3748; margin-bottom: 25px;"><i class="fas fa-id-card" style="color: #3182ce;"></i> Student Profile Account</h2>
        <div style="background: white; padding: 35px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 700px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px;">
                <div>
                    <label style="display: block; font-size: 0.9rem; color: #718096; margin-bottom: 5px;">Full Name</label>
                    <p style="font-size: 1.1rem; font-weight: 600; color: #2d3748; margin: 0;">{{ user.name }}</p>
                </div>
                <div>
                    <label style="display: block; font-size: 0.9rem; color: #718096; margin-bottom: 5px;">Register Number</label>
                    <p style="font-size: 1.1rem; font-weight: 600; color: #2d3748; margin: 0;">{{ user.register_number }}</p>
                </div>
                <div>
                    <label style="display: block; font-size: 0.9rem; color: #718096; margin-bottom: 5px;">Institutional Department</label>
                    <p style="font-size: 1.1rem; color: #2d3748; margin: 0;">{{ user.department }}</p>
                </div>
                <div>
                    <label style="display: block; font-size: 0.9rem; color: #718096; margin-bottom: 5px;">Academic Track Year</label>
                    <p style="font-size: 1.1rem; color: #2d3748; margin: 0;">{{ user.year }}</p>
                </div>
                <div>
                    <label style="display: block; font-size: 0.9rem; color: #718096; margin-bottom: 5px;">Email Workspace</label>
                    <p style="font-size: 1.1rem; color: #2d3748; margin: 0;">{{ user.email }}</p>
                </div>
                <div>
                    <label style="display: block; font-size: 0.9rem; color: #718096; margin-bottom: 5px;">Mobile Contact</label>
                    <p style="font-size: 1.1rem; color: #2d3748; margin: 0;">{{ user.phone }}</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
